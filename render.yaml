services:
  # ── Python / Flask API ──────────────────────────────────────────────────────
  - type: web
    name: stock-sutra
    env: python
    plan: free
    rootDir: server
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    autoDeploy: true
    buildFilter:
      paths:
        - server/**

  # ── React Static Site ───────────────────────────────────────────────────────
  - type: web
    name: stock-sutra-frontend
    env: static
    plan: free
    rootDir: client
    buildCommand: "npm install && npm run build"
    staticPublishPath: build
    autoDeploy: true
    buildFilter:
      paths:
        - client/**
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        value: https://stock-sutra.onrender.com
